# =====================================================================
# OrthoPro Connect - Application Configuration
# All secrets come from environment variables.
# For local dev: copy .env.example to .env and fill values.
# For Railway/Render: set these as environment variables in the dashboard.
# =====================================================================

spring.application.name=orthoproconnect

# ── Database (PostgreSQL) ─────────────────────────────────────────────
# Railway auto-injects DATABASE_URL. Render provides it too.
# Format: jdbc:postgresql://host:5432/dbname
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/orthopro}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP) — important on free-tier DBs with max 20 connections
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ── JPA / Hibernate ───────────────────────────────────────────────────
# 'update' keeps existing data between restarts. Use 'create-drop' only for tests.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Server ───────────────────────────────────────────────────────────
# PORT is injected by Railway/Render automatically
server.port=${PORT:8081}
server.address=0.0.0.0

# ── Date / Time ──────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
spring.jackson.time-zone=UTC

# ── File Uploads ─────────────────────────────────────────────────────
# On free-tier cloud (Railway, Render), filesystem is ephemeral.
# Files survive restarts but are wiped on re-deploy.
# For production, swap to Cloudinary or S3. For a school project this is fine.
app.upload-dir=${UPLOAD_DIR:uploads}
app.docs-dir=${DOCS_DIR:uploads/docs}
app.tests-dir=${TESTS_DIR:uploads/tests}
app.models-dir=${MODELS_DIR:uploads/models}
app.qrcode-dir=${QRCODE_DIR:uploads/qr-codes}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── QR Code ──────────────────────────────────────────────────────────
qrcode.salt=${QRCODE_SALT:OrthoPro-Change-This-In-Production}
qrcode.width=250
qrcode.height=250

# ── CORS ─────────────────────────────────────────────────────────────
# Comma-separated list of allowed frontend origins
# e.g. https://myapp.netlify.app,https://mystock.netlify.app
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501,http://localhost:3000}

# ── Misc ─────────────────────────────────────────────────────────────
spring.main.allow-bean-definition-overriding=true
logging.level.orthoproconnect=INFO
logging.level.org.springframework.security=WARN
